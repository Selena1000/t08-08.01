<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Products</title>
    <link rel="stylesheet" href="css/generel.css" />
    <link rel="stylesheet" href="css/products.css" />
    <script src="js/products.js" defer></script>
  </head>
  <body>
    <header>
      <div class="split">
        <a href="index.html">
          <h1>Fashion<span>R</span>Us</h1>
        </a>
        <div class="smallpush">
          <a href="index.html"> Categories</a>
          <a href="productlist.html">Brands</a>
          <a href="products.html">Seasons</a>
        </div>
      </div>
    </header>
    <main id="productContainer">
      <div class="product_page">
        <div class="product_image"><img src="https://kea-alt-del.dk/t7/images/webp/640/1543.webp" /></div>

        <div class="product_info">
          <h1>Product Information</h1>

          <h2>Puma</h2>

          <p>
            <strong>Model name</strong><br />
            Winter Team Denmark Fanwear Red Athlete Shoes
          </p>

          <p><strong>Type</strong><br /></p>
          <p>
            <strong>Inventory number</strong><br />
            1163
          </p>

          <p>
            <strong>Season</strong><br />
            indsæt<br />
          </p>

          <p>Puma, creating experiences for today's athlete</p>
        </div>

        <div class="buy_box">
          <h2>Red Puma Football Shoes</h2>
          <p class="category">Puma | Shoes</p>
          <p class="originalprice">Price:</p>

          <p class="choose">Choose a size</p>
          <select>
            <option>XS</option>
            <option>S</option>
            <option>M</option>
            <option>L</option>
            <option>XL</option>
          </select>

          <button>Add to basket</button>
        </div>
      </div>
    </main>
  </body>
</html>
